server {
    server_name psico.wailus.co;
    client_max_body_size 30M;

    root /home/ubuntu/apps/psicomorfosis/dist/client;

    location /api/ {
        proxy_pass http://127.0.0.1:3012;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /socket.io/ {
        proxy_pass http://127.0.0.1:3012;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Hashed build assets.
    # types{} dentro del location porque ".mjs" no está en el mime.types
    # default de nginx — sin esto los workers ESM (pdf.js, etc.) caen al
    # fallback application/octet-stream y el browser rechaza el dynamic
    # import con "Failed to fetch dynamically imported module".
    location ^~ /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        types {
            application/javascript js mjs;
            text/css            css;
            image/svg+xml       svg svgz;
            image/png           png;
            image/jpeg          jpg jpeg;
            image/webp          webp;
            image/gif           gif;
            image/x-icon        ico;
            application/json    json;
            application/wasm    wasm;
            font/woff           woff;
            font/woff2          woff2;
            application/font-otf otf;
            application/x-font-ttf ttf;
        }
        default_type application/octet-stream;

        # Override de cache para .mjs: el incidente del 18-jun-2026
        # demostró que si por bug un .mjs sale con MIME incorrecto,
        # el browser lo cachea con immutable+1y y queda roto sin
        # recuperación. Para .mjs usamos max-age corto + must-revalidate
        # con ETag. El costo: una request condicional (304 If-None-Match)
        # cada 5 minutos por archivo — irrelevante en performance.
        # Nested location necesario porque ^~ /assets/ es "stop search"
        # y bloquea las regex hermanas.
        location ~ \.mjs$ {
            expires off;
            etag on;
            add_header Cache-Control "public, max-age=300, must-revalidate";
            try_files $uri @ssr;
        }

        try_files $uri @ssr;
    }

    # .mjs en cualquier path fuera de /assets/ (ej: /pdfjs-worker.mjs
    # servido desde public/). MIME application/javascript + cache
    # revalidable. La regex `~ \.mjs$` tiene menor prioridad que el
    # prefijo ^~ /assets/, así que los .mjs bajo /assets/ siguen
    # gobernados por su location anidado.
    location ~ \.mjs$ {
        access_log off;
        types { application/javascript mjs; }
        default_type application/javascript;
        add_header Cache-Control "public, max-age=300, must-revalidate";
        etag on;
        try_files $uri @ssr;
    }

    # Resto: servir archivo estático si existe, sino SSR
    location / {
        try_files $uri @ssr;
    }

    location @ssr {
        proxy_pass http://127.0.0.1:3013;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/psico.wailus.co/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/psico.wailus.co/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = psico.wailus.co) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name psico.wailus.co;
    client_max_body_size 30M;
    return 404; # managed by Certbot
}
